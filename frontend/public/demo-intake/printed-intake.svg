<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#f7f4ec"/>
  <rect x="90" y="70" width="1020" height="760" rx="24" fill="#fffdf8" stroke="#2d3748" stroke-width="4"/>
  <text x="130" y="140" font-family="Georgia, serif" font-size="36" fill="#1f2937">Sunrise Services Intake Form</text>
  <text x="132" y="178" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">New client registration and needs assessment</text>

  <g font-family="Arial, sans-serif" font-size="22" fill="#111827">
    <text x="140" y="260">First name</text>
    <line x1="140" y1="280" x2="520" y2="280" stroke="#9ca3af" stroke-width="2"/>
    <text x="560" y="260">Last name</text>
    <line x1="560" y1="280" x2="1040" y2="280" stroke="#9ca3af" stroke-width="2"/>

    <text x="140" y="340">Date of birth</text>
    <line x1="140" y1="360" x2="420" y2="360" stroke="#9ca3af" stroke-width="2"/>
    <text x="460" y="340">Phone</text>
    <line x1="460" y1="360" x2="760" y2="360" stroke="#9ca3af" stroke-width="2"/>
    <text x="800" y="340">Email</text>
    <line x1="800" y1="360" x2="1040" y2="360" stroke="#9ca3af" stroke-width="2"/>

    <text x="140" y="430">Address</text>
    <line x1="140" y1="450" x2="1040" y2="450" stroke="#9ca3af" stroke-width="2"/>

    <text x="140" y="510">Language</text>
    <line x1="140" y1="530" x2="360" y2="530" stroke="#9ca3af" stroke-width="2"/>
    <text x="420" y="510">Gender</text>
    <line x1="420" y1="530" x2="640" y2="530" stroke="#9ca3af" stroke-width="2"/>
    <text x="700" y="510">Household size</text>
    <line x1="700" y1="530" x2="920" y2="530" stroke="#9ca3af" stroke-width="2"/>

    <text x="140" y="600">Current needs / notes</text>
    <rect x="140" y="620" width="900" height="120" rx="12" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  </g>

  <g font-family="'Bradley Hand', 'Comic Sans MS', cursive" font-size="26" fill="#0f172a">
    <text x="150" y="273">Maria</text>
    <text x="570" y="273">Alvarez</text>
    <text x="150" y="353">1988-04-12</text>
    <text x="468" y="353">(555) 210-4412</text>
    <text x="808" y="353">m.alvarez@email.com</text>
    <text x="150" y="443">814 West Pine St, Unit 3, Cedar Grove</text>
    <text x="150" y="523">Spanish</text>
    <text x="430" y="523">Female</text>
    <text x="710" y="523">4</text>
    <text x="160" y="657">Needs SNAP renewal help and school supplies.</text>
    <text x="160" y="692">Requested a housing resource follow-up next week.</text>
  </g>
</svg>
